```html
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>承邦 VECTECH - AI 簡報轉檔系統 V1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md border-t-4 border-blue-600">
        <h1 class="text-3xl font-extrabold text-center text-blue-900 mb-2">承邦 VECTECH</h1>
        <p class="text-sm text-gray-500 mb-6 text-center font-medium">段落級精準替換 ‧ 專屬版面風格 V1.0</p>

        <form id="uploadForm" class="space-y-5">
            <!-- 上傳 PPTX -->
            <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                <label class="block text-sm font-bold text-gray-800 mb-2">1. 選擇來源簡報 (.pptx)</label>
                <input type="file" id="pptFile" accept=".pptx" required class="block w-full text-sm text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 cursor-pointer">
            </div>

            <!-- 上傳 Logo -->
            <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                <label class="block text-sm font-bold text-gray-800 mb-2">2. 選擇 VECTECH Logo (選填, .png)</label>
                <input type="file" id="logoFile" accept=".png,.jpg,.jpeg" class="block w-full text-sm text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-green-100 file:text-green-700 hover:file:bg-green-200 cursor-pointer">
                <p class="text-xs text-gray-400 mt-2">* 若上傳，系統會自動刪除舊 Logo 並將新 Logo 貼在每頁右上角。</p>
            </div>
            
            <button type="submit" id="submitBtn" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-md text-base font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all">
                🚀 一鍵執行精準轉檔
            </button>
        </form>

        <div id="status" class="mt-6 text-center text-sm font-bold text-blue-600 hidden bg-blue-50 p-3 rounded-lg">
            <div class="animate-spin rounded-full h-8 w-8 border-b-4 border-blue-600 mx-auto mb-3"></div>
            系統正在進行段落重組與深度替換，請耐心等候...
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('pptFile');
            const logoInput = document.getElementById('logoFile');
            const submitBtn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('status');

            if (fileInput.files.length === 0) {
                alert('請選擇簡報檔案！');
                return;
            }

            // 鎖定介面
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50');
            statusDiv.classList.remove('hidden');

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            if (logoInput.files.length > 0) {
                formData.append('logo', logoInput.files[0]);
            }

            try {
                // ⚠️ 這裡請務必確認是你的 Render 網址！
                const response = await fetch('https://my-pptx-bot-lw8t.onrender.com/convert', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('轉檔發生異常，請檢查伺服器連線。');
                }

                // 接收唯一的 PPTX 檔案並觸發下載
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `VECTECH_承邦轉檔_${fileInput.files[0].name}`;
                document.body.appendChild(a);
                a.click();
                
                window.URL.revokeObjectURL(url);
                
            } catch (error) {
                alert(error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50');
                statusDiv.classList.add('hidden');
            }
        });
    </script>
</body>
</html>


```
