<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>承邦有限公司 V0.1 - AI 智慧轉檔</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #1e3a8a; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glass-panel { background: white; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); overflow: hidden; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-panel w-full max-w-md">
        <!-- Header -->
        <div class="bg-slate-900 px-6 py-10 text-center rounded-b-[40px] shadow-lg">
            <div class="w-20 h-20 bg-blue-500 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-inner">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-wider">承邦有限公司 <span class="text-sm text-blue-300">V0.1</span></h1>
            <p class="text-slate-400 text-sm mt-2">智慧品牌與轉檔系統</p>
        </div>

        <!-- Content -->
        <div class="p-6 space-y-6">
            <!-- Upload Form -->
            <form id="uploadForm" class="space-y-4">
                
                <div class="relative border-2 border-dashed border-slate-200 rounded-xl p-4 text-center hover:bg-slate-50 transition">
                    <input type="file" id="pptxFile" accept=".pptx" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <div class="flex items-center justify-center space-x-2 text-slate-600">
                        <span id="pptxName" class="font-medium truncate">選擇 PPTX 簡報檔...</span>
                    </div>
                </div>

                <div class="relative border-2 border-dashed border-slate-200 rounded-xl p-4 text-center hover:bg-slate-50 transition">
                    <input type="file" id="logoFile" accept="image/png, image/jpeg" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <div class="flex items-center justify-center space-x-2 text-slate-600">
                        <span id="logoName" class="text-sm truncate">選擇公司 Logo (去背PNG)...</span>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-md transition transform active:scale-95">
                    一鍵極速轉檔
                </button>
            </form>

            <!-- Loading State -->
            <div id="loading" class="hidden text-center py-6 space-y-4">
                <div class="spinner"></div>
                <p class="text-slate-600 font-medium animate-pulse" id="loadingText">正在進行光速轉換...</p>
                <p class="text-xs text-slate-400">系統喚醒可能需要一點時間，請勿關閉網頁</p>
            </div>

            <!-- Success State -->
            <div id="success" class="hidden text-center py-4 space-y-4">
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-2">
                    <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h3 class="text-xl font-bold text-slate-800">轉檔完成！</h3>
                
                <button id="downloadBtn" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-xl shadow-md transition transform active:scale-95 flex items-center justify-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                    選擇儲存位置
                </button>
                <p class="text-xs text-slate-500">點擊後請選擇「儲存到檔案」或傳送至 LINE</p>
            </div>
        </div>
    </div>

    <script>
        // 檔案選擇文字更新
        document.getElementById('pptxFile').addEventListener('change', function(e) {
            document.getElementById('pptxName').textContent = e.target.files[0] ? e.target.files[0].name : '選擇 PPTX 簡報檔...';
        });
        document.getElementById('logoFile').addEventListener('change', function(e) {
            document.getElementById('logoName').textContent = e.target.files[0] ? e.target.files[0].name : '選擇公司 Logo (去背PNG)...';
        });

        // 表單提交處理
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const pptxFile = document.getElementById('pptxFile').files[0];
            const logoFile = document.getElementById('logoFile').files[0];
            
            if (!pptxFile) return alert('請選擇 PPTX 檔案');

            const formData = new FormData();
            formData.append('pptx_file', pptxFile);
            if (logoFile) formData.append('logo_file', logoFile);

            // 切換UI狀態
            document.getElementById('uploadForm').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('success').classList.add('hidden');

            try {
                // 注意：請確保這裡的網址是你 Render 的網址
                const response = await fetch('https://my-pptx-bot-lw8t.onrender.com/translate', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || `伺服器回應錯誤 (狀態碼: ${response.status})`);
                }

                // 處理下載檔案
                const blob = await response.blob();
                const newFilename = '承邦翻譯_' + pptxFile.name;
                const file = new File([blob], newFilename, { type: 'application/vnd.openxmlformats-officedocument.presentationml.presentation' });

                // 準備分享/下載功能
                const downloadBtn = document.getElementById('downloadBtn');
                downloadBtn.onclick = async () => {
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share({
                                files: [file],
                                title: '承邦翻譯簡報',
                                text: '這是由承邦有限公司系統自動轉檔的簡報'
                            });
                        } catch (err) {
                            console.log('分享取消或失敗:', err);
                            fallbackDownload(blob, newFilename);
                        }
                    } else {
                        fallbackDownload(blob, newFilename);
                    }
                };

                // 顯示成功畫面
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('success').classList.remove('hidden');

            } catch (error) {
                console.error('Error:', error);
                alert('轉檔失敗，請檢查網路或稍後再試。\n錯誤訊息: ' + error.message);
                // 發生錯誤，恢復上傳畫面，停止轉圈圈
                document.getElementById('uploadForm').classList.remove('hidden');
                document.getElementById('loading').classList.add('hidden');
            }
        });

        function fallbackDownload(blob, filename) {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
