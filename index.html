<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>承邦有限公司 - 簡報轉檔系統 V0.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold text-center text-blue-800 mb-2">承邦有限公司 V0.2</h1>
        <p class="text-sm text-gray-500 mb-6 text-center">支援全域替換與 VECTECH 字體風格</p>

        <form id="uploadForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">請選擇來源簡報 (PPTX)</label>
                <input type="file" id="pptFile" accept=".pptx" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>
            
            <button type="submit" id="submitBtn" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                開始轉檔
            </button>
        </form>

        <div id="status" class="mt-6 text-center text-sm font-medium text-blue-600 hidden">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto mb-2"></div>
            正在進行深度替換與轉檔，請稍候...
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('pptFile');
            const submitBtn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('status');

            if (fileInput.files.length === 0) {
                alert('請先選擇要轉檔的 PPTX 檔案！');
                return;
            }

            // 鎖定按鈕並顯示處理中
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50');
            statusDiv.classList.remove('hidden');

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                // 【請注意】: 這裡請務必確認你的 Render 伺服器網址是否正確
                const response = await fetch('https://my-pptx-bot-lw8t.onrender.com/convert', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('轉檔過程發生異常，請檢查伺服器狀態。');
                }

                // 直接以二進位 (Blob) 形式接收唯一的 PPTX 檔案
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `承邦轉檔_${fileInput.files[0].name}`;
                document.body.appendChild(a);
                a.click();
                
                // 清理記憶體
                window.URL.revokeObjectURL(url);
                
            } catch (error) {
                alert(error.message);
            } finally {
                // 恢復按鈕狀態
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50');
                statusDiv.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
