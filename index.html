
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>承邦有限公司 - 專屬簡報轉檔神器 V1.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-2xl w-full max-w-md border-t-4 border-blue-600">
        <h1 class="text-3xl font-extrabold text-center text-blue-900 mb-2">承邦有限公司</h1>
        <p class="text-sm text-gray-500 mb-6 text-center font-medium">XML 終極清洗與替換引擎 V1.2</p>

        <form id="uploadForm" class="space-y-5">
            <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                <label class="block text-sm font-bold text-gray-800 mb-2">1. 選擇要翻譯的簡報 (PPTX)</label>
                <input type="file" id="pptFile" accept=".pptx" required class="block w-full text-sm text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 cursor-pointer">
            </div>

            <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                <label class="block text-sm font-bold text-gray-800 mb-2">2. 選擇去背 Logo (PNG格式, 選填)</label>
                <input type="file" id="logoFile" accept="image/png, image/jpeg" class="block w-full text-sm text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-green-100 file:text-green-700 hover:file:bg-green-200 cursor-pointer">
            </div>
            
            <button type="submit" id="submitBtn" class="w-full flex justify-center py-4 px-4 border border-transparent rounded-xl shadow-md text-lg font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all active:scale-95">
                🚀 開始一鍵轉檔
            </button>
        </form>

        <div id="status" class="mt-6 text-center text-sm font-bold text-blue-600 hidden bg-blue-50 p-4 rounded-xl">
            <div class="animate-spin rounded-full h-10 w-10 border-b-4 border-blue-600 mx-auto mb-3"></div>
            正在進行 XML 底層清洗與轉換，請勿關閉畫面...<br><span class="text-xs text-gray-500 mt-2 block">這可能需要 30~60 秒，請耐心等候</span>
        </div>
        
        <div id="errorMsg" class="mt-4 text-center text-sm font-bold text-red-600 hidden bg-red-50 p-4 rounded-xl border border-red-200">
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('pptFile');
            const logoInput = document.getElementById('logoFile');
            const submitBtn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('status');
            const errorDiv = document.getElementById('errorMsg');

            if (fileInput.files.length === 0) return;

            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50');
            statusDiv.classList.remove('hidden');
            errorDiv.classList.add('hidden');

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            if (logoInput.files.length > 0) {
                formData.append('logo', logoInput.files[0]);
            }

            try {
                // ⚠️ 請確保這是你 Render 的正確網址
                const response = await fetch('https://my-pptx-bot-lw8t.onrender.com/convert', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    let errText = "伺服器無回應或發生錯誤";
                    try {
                        const errJson = await response.json();
                        errText = errJson.error || errText;
                    } catch (e) {
                        errText = await response.text() || errText;
                    }
                    throw new Error(errText);
                }

                const blob = await response.blob();
                if (blob.size === 0) throw new Error("伺服器回傳了空檔案");

                // iOS 安全下載機制
                const fileName = `承邦轉檔_${fileInput.files[0].name}`;
                
                if (navigator.share && /iPad|iPhone|iPod/.test(navigator.userAgent)) {
                    // iOS 使用 Share API 呼叫原生選單，徹底解決找不到檔案的問題
                    const file = new File([blob], fileName, { type: blob.type });
                    try {
                        await navigator.share({
                            files: [file],
                            title: fileName
                        });
                    } catch (shareErr) {
                        // 如果使用者取消分享，則使用傳統下載
                        fallbackDownload(blob, fileName);
                    }
                } else {
                    fallbackDownload(blob, fileName);
                }
                
            } catch (error) {
                errorDiv.innerText = `錯誤: ${error.message}`;
                errorDiv.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50');
                statusDiv.classList.add('hidden');
            }
        });

        function fallbackDownload(blob, fileName) {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            }, 100);
        }
    </script>
</body>
</html>
