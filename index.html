<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>承邦有限公司 - AI 簡報系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        .loader { border-top-color: #1e293b; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-md overflow-hidden border">
        <div class="bg-slate-900 p-8 text-white text-center">
            <div class="bg-blue-500 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-building-shield text-3xl"></i></div>
            <h1 class="text-2xl font-bold">承邦有限公司</h1>
            <p class="text-slate-400 text-sm">AI 智慧品牌與轉檔系統</p>
        </div>
        <div class="p-8 space-y-6">
            <div class="space-y-4">
                <input type="file" id="pptxInput" accept=".pptx" class="block w-full text-sm border-2 border-dashed rounded-2xl p-3 bg-slate-50">
                <input type="file" id="logoInput" accept="image/*" class="block w-full text-sm border-2 border-dashed rounded-2xl p-3 bg-slate-50">
            </div>
            <div id="statusArea" class="hidden text-center"><div class="loader border-4 rounded-full w-10 h-10 mx-auto mb-2"></div><p class="text-sm font-bold">正在優化為承邦專屬內容...</p></div>
            <div id="errorArea" class="hidden bg-red-50 text-red-700 p-4 rounded-xl text-xs"></div>
            <button id="btnSubmit" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-lg">一鍵品牌轉檔</button>
            <div id="successSection" class="hidden space-y-3">
                <div class="bg-green-500 text-white p-3 rounded-2xl text-center font-bold">轉換成功！</div>
                <button id="btnSave" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl">選擇儲存位置 / 分享檔案</button>
                <button onclick="location.reload()" class="w-full text-slate-400 text-xs">處理下一個檔案</button>
            </div>
        </div>
    </div>
    <script>
        const SERVER_URL = "https://my-pptx-bot-lw8t.onrender.com/process-pptx";
        let resultBlob = null, finalFileName = "";

        document.getElementById('btnSubmit').addEventListener('click', async () => {
            const pptxFile = document.getElementById('pptxInput').files[0];
            const logoFile = document.getElementById('logoInput').files[0];
            if (!pptxFile) return alert('請選檔案');

            document.getElementById('btnSubmit').classList.add('hidden');
            document.getElementById('statusArea').classList.remove('hidden');

            const formData = new FormData();
            formData.append('pptx', pptxFile);
            if (logoFile) formData.append('logo', logoFile);

            try {
                const response = await fetch(SERVER_URL, { method: 'POST', body: formData });
                resultBlob = await response.blob();
                finalFileName = `承邦轉檔_${pptxFile.name}`;
                document.getElementById('statusArea').classList.add('hidden');
                document.getElementById('successSection').classList.remove('hidden');
            } catch (e) {
                alert('伺服器睡眠中，請等一分鐘後再試');
                location.reload();
            }
        });

        document.getElementById('btnSave').addEventListener('click', async () => {
            if (!resultBlob) return;
            const file = new File([resultBlob], finalFileName, { type: resultBlob.type });
            if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                try { await navigator.share({ files: [file], title: '承邦簡報' }); } catch (e) { standardDownload(); }
            } else { standardDownload(); }
        });

        function standardDownload() {
            const a = document.createElement('a'); a.href = window.URL.createObjectURL(resultBlob); a.download = finalFileName; a.click();
        }
    </script>
</body>
</html>
