<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>承邦有限公司 - 簡報轉檔神器 V1.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
        <h1 class="text-2xl font-bold text-center text-blue-800 mb-2">承邦有限公司</h1>
        <h2 class="text-sm font-semibold text-center text-gray-500 mb-6">專屬簡報轉檔神器 V1.1</h2>
        
        <form id="uploadForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">1. 選擇要翻譯的簡報 (PPTX)</label>
                <input type="file" id="pptFile" accept=".pptx" required class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">2. 選擇去背 Logo 圖片 (PNG格式，選填)</label>
                <input type="file" id="logoFile" accept="image/png" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100 transition">
            </div>
            
            <button type="submit" id="submitBtn" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 font-bold text-lg transition">
                開始一鍵轉檔
            </button>
        </form>

        <div id="loadingStatus" class="hidden mt-6 text-center">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto mb-2"></div>
            <p class="text-sm text-gray-600">正在極速轉換與替換內容，請稍候...</p>
        </div>

        <div id="errorBox" class="hidden mt-4 p-4 bg-red-100 text-red-700 rounded-md text-sm text-center"></div>
    </div>

    <script>
        // 【重要】請確認這是你 Render 的真實網址！
        const RENDER_API_URL = "https://my-pptx-bot-lw8t.onrender.com"; 

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const pptFile = document.getElementById('pptFile').files[0];
            const logoFile = document.getElementById('logoFile').files[0];
            
            if (!pptFile) {
                showError("請選擇 PPTX 檔案！");
                return;
            }

            const formData = new FormData();
            formData.append('file', pptFile);
            if (logoFile) {
                formData.append('logo', logoFile);
            }

            showLoading(true);
            showError("");

            try {
                const response = await fetch(`${RENDER_API_URL}/translate`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || "轉檔伺服器發生異常");
                }

                const blob = await response.blob();
                const downloadName = "承邦翻譯_" + pptFile.name;
                
                // 呼叫手機的原生分享/儲存系統
                if (navigator.share && navigator.canShare) {
                    const file = new File([blob], downloadName, { type: blob.type });
                    if (navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share({
                                files: [file],
                                title: 'V1.1 轉檔完成',
                                text: '這是您的承邦專屬翻譯簡報'
                            });
                            showLoading(false);
                            return; 
                        } catch (shareErr) {
                            console.log("用戶取消分享，轉為一般下載");
                        }
                    }
                }

                // 一般下載模式 (電腦端備用)
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = downloadName;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
                
            } catch (error) {
                showError("錯誤: " + error.message);
            } finally {
                showLoading(false);
            }
        });

        function showLoading(show) {
            document.getElementById('submitBtn').style.display = show ? 'none' : 'block';
            document.getElementById('loadingStatus').style.display = show ? 'block' : 'none';
        }

        function showError(msg) {
            const box = document.getElementById('errorBox');
            if (msg) {
                box.textContent = msg;
                box.style.display = 'block';
            } else {
                box.style.display = 'none';
            }
        }
    </script>
</body>
</html>
